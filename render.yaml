# Render Blueprint for PDF Tool (free tier)
# Docs: https://render.com/docs/blueprint-spec
#
# Creates: a free PostgreSQL database + the API (Docker) + the web app (Docker).
# NOTE: onrender.com subdomains are globally unique. If "pdftool-api" or
# "pdftool-web" is taken, Render appends a suffix and the real URLs will differ.
# After the first deploy, confirm each service's URL in the dashboard and, if
# they differ from the values below, update API_URL / WEB_URL and redeploy the
# web service with "Clear build cache & deploy".

databases:
  - name: pdftool-db
    plan: free
    databaseName: pdfforge
    user: pdfforge

services:
  # ── API: Express + Prisma (PostgreSQL) ───────────────────────────
  - type: web
    name: pdftool-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pdftool-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: WEB_URL
        value: https://pdftool-web.onrender.com
      - key: API_URL
        value: https://pdftool-api.onrender.com
      # Optional integrations — values are set once in the Render dashboard
      # (sync: false keeps them out of git). SMTP enables real verification
      # and password-reset emails; Google enables OAuth sign-in.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  # ── Web: Next.js (proxies /api/* to the API above) ───────────────
  - type: web
    name: pdftool-web
    runtime: docker
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      # Baked into the Next.js build (build arg) so /api/* proxies to the API.
      # Must match the API service's real URL.
      - key: API_URL
        value: https://pdftool-api.onrender.com
