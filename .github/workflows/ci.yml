name: CI

# Runs on every push and pull request to main: lint, typecheck, tests, build,
# and a real-browser smoke test. A red check here means do not deploy.
#
# Installs use pnpm with --frozen-lockfile: the committed pnpm-lock.yaml is
# platform-complete (it records Windows AND Linux native binaries, unlike
# npm's lockfile — npm/cli#4828), so every environment builds the exact same
# dependency tree. Reproducible builds, no delete-the-lockfile workarounds.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm (pinned via packageManager field)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pdfforge/api db:generate

      - name: Typecheck
        run: pnpm typecheck

      # Lint is advisory: a style or config issue should never block a deploy.
      # Typecheck, tests, and the build are the hard gates.
      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test

      - name: Build web app
        run: pnpm build

  # Browser smoke tests: core user journeys in real Chromium. A hard gate
  # since the suite proved stable: a red here means the product is broken.
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: "file:./e2e.db"
      JWT_ACCESS_SECRET: "e2e-ci-access-secret-0123456789-0123456789-0123456789"
      JWT_REFRESH_SECRET: "e2e-ci-refresh-secret-0123456789-0123456789-0123456789"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client & dev database
        run: |
          pnpm --filter @pdfforge/api db:generate
          pnpm --filter @pdfforge/api db:setup

      - name: Install qpdf (powers the protect/unlock journey)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qpdf

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: pnpm test:e2e
