name: CI

# Runs on every push and pull request to main: lint, typecheck, tests, build.
# A red check here means the change should not be deployed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # `npm install` (not `npm ci`): the committed lockfile is generated on
      # Windows and can omit Linux-only native binaries (sharp, @napi-rs/canvas,
      # libsql — npm/cli#4828). Installing fresh resolves the correct linux-x64
      # packages, matching how the Docker images build.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run db:generate -w @pdfforge/api

      - name: Typecheck
        run: npm run typecheck

      # Lint is advisory: a style or config issue should never block a deploy.
      # Typecheck, tests, and the build are the hard gates below.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # LibreOffice/Tesseract are not installed here, so the 3 conversion/OCR
      # tests that depend on them skip automatically (they never hard-fail).
      - name: Test
        run: npm test

      - name: Build web app
        run: npm run build
