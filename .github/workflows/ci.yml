name: CI

# Runs on every push and pull request to main: lint, typecheck, tests, build.
# A red check here means the change should not be deployed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # The committed lockfile is generated on Windows and omits Linux-only
      # native binaries (@napi-rs/canvas, sharp, libsql — npm/cli#4828), so a
      # lockfile-based install can't load them on Linux. Removing it forces a
      # fresh resolution for linux-x64, exactly as the Docker images do.
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run db:generate -w @pdfforge/api

      - name: Typecheck
        run: npm run typecheck

      # Lint is advisory: a style or config issue should never block a deploy.
      # Typecheck, tests, and the build are the hard gates below.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # LibreOffice/Tesseract are not installed here, so the 3 conversion/OCR
      # tests that depend on them skip automatically (they never hard-fail).
      - name: Test
        run: npm test

      - name: Build web app
        run: npm run build

  # Browser smoke test: guest → upload → viewer → library, in real Chromium.
  # Advisory while it proves itself stable (a red here does not block deploys);
  # promote to a hard gate by removing continue-on-error once trusted.
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    env:
      DATABASE_URL: "file:./e2e.db"
      JWT_ACCESS_SECRET: "e2e-ci-access-secret-0123456789-0123456789-0123456789"
      JWT_REFRESH_SECRET: "e2e-ci-refresh-secret-0123456789-0123456789-0123456789"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Generate Prisma client & dev database
        run: |
          npm run db:generate -w @pdfforge/api
          npm run db:setup -w @pdfforge/api

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e
